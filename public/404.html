<!DOCTYPE html>
<html>

<head>
    <script>
        var pathSegmentsToKeep = 1;

        var l = window.location;

        sessionStorage.redirect =
            l.protocol + "//" + l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname + l.search + l.hash;

        l.replace(
            l.protocol + "//" + l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/"
        );
    </script>
</head>

<body></body>

</html>
